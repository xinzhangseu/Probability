<script>
(function () {
  function nestCurrentPageSections() {
    const sidebar = document.querySelector("#quarto-sidebar");
    const toc = document.querySelector("#TOC");

    if (!sidebar || !toc) return;

    const activeChapter =
      sidebar.querySelector("a.sidebar-link.active") ||
      sidebar.querySelector('a.sidebar-link[aria-current="page"]') ||
      sidebar.querySelector('a[aria-current="page"]');

    if (!activeChapter) return;

    const chapterItem = activeChapter.closest("li.sidebar-item");
    const tocList = toc.querySelector("ul");

    if (!chapterItem || !tocList) return;

    chapterItem.classList.add("current-chapter");
    activeChapter.setAttribute("aria-expanded", "true");
    tocList.classList.add("current-chapter-sections");

    // Quarto renders deeper TOC levels as Bootstrap collapse lists. Remove the
    // collapsed state after moving the TOC so all configured levels are shown.
    tocList.querySelectorAll("ul.collapse").forEach(function (list) {
      list.classList.remove("collapse");
      list.classList.add("show");
    });

    // Move rather than copy the generated TOC so Quarto's scroll highlighting
    // continues to update the section links.
    chapterItem.appendChild(tocList);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", nestCurrentPageSections);
  } else {
    nestCurrentPageSections();
  }
})();
</script>
