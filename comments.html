<div id="comments" class="comments-wrapper">
  <div class="giscus"></div>
</div>

<script>
(function () {
  function currentGiscusTheme() {
    const htmlTheme = document.documentElement.getAttribute("data-bs-theme");
    const body = document.body;
    const isDark =
      htmlTheme === "dark" ||
      body.classList.contains("quarto-dark");
    return isDark ? "dark" : "light";
  }

  function updateGiscusTheme() {
    const frame = document.querySelector(".giscus-frame");
    if (!frame || !frame.contentWindow) return;
    frame.contentWindow.postMessage(
      { giscus: { setConfig: { theme: currentGiscusTheme() } } },
      "https://giscus.app"
    );
  }

  function initializeComments() {
    const comments = document.querySelector("#comments");
    const navigation = document.querySelector("nav.page-navigation");
    const container = comments && comments.querySelector(".giscus");

    if (!comments || !container) return;

    // Place the discussion below the previous/next section navigation.
    if (navigation) {
      navigation.insertAdjacentElement("afterend", comments);
    }

    const script = document.createElement("script");
    script.src = "https://giscus.app/client.js";
    script.async = true;
    script.crossOrigin = "anonymous";
    script.setAttribute("data-repo", "xinzhangseu/Probability");
    script.setAttribute("data-repo-id", "R_kgDOTdREOQ");
    script.setAttribute("data-category", "Comments");
    script.setAttribute("data-category-id", "DIC_kwDOTdREOc4DBkQP");
    script.setAttribute("data-mapping", "pathname");
    script.setAttribute("data-strict", "0");
    script.setAttribute("data-reactions-enabled", "1");
    script.setAttribute("data-emit-metadata", "0");
    script.setAttribute("data-input-position", "top");
    script.setAttribute("data-theme", currentGiscusTheme());
    script.setAttribute("data-lang", "zh-CN");
    script.setAttribute("data-loading", "lazy");
    container.appendChild(script);

    // Keep Giscus synchronized with Quarto's own light/dark mode.
    const themeObserver = new MutationObserver(updateGiscusTheme);
    themeObserver.observe(document.body, {
      attributes: true,
      attributeFilter: ["class"]
    });
    themeObserver.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-bs-theme"]
    });

    const frameObserver = new MutationObserver(function () {
      const frame = container.querySelector(".giscus-frame");
      if (!frame) return;
      frame.addEventListener("load", updateGiscusTheme, { once: true });
      updateGiscusTheme();
      frameObserver.disconnect();
    });
    frameObserver.observe(container, { childList: true });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initializeComments);
  } else {
    initializeComments();
  }
})();
</script>
