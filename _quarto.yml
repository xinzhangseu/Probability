project:
  type: book
  output-dir: _book

book:
  title: "ElegantBook PDF Template"
  author:
    - id: author
      name: Your Name
      affiliations:
        - name: Your University
          department: Your Department
          city: Your City
          country: Your Country
          postal-code: 000000
      orcid: 0000-0000-0000-0001
      email: your.email@university.edu
      url: https://your-university.edu/your-profile
      attributes:
        corresponding: true
      bio: |
        Your bio text here. This will appear on the author page at the end of the book.
  chapters:
    - index.qmd
    - template_chapter1.qmd
    - sections/elegantbook/01.qmd
    - sections/elegantbook/02.qmd
    - sections/elegantbook/03.qmd
    - sections/elegantbook/04.qmd
    - sections/elegantbook/05.qmd
    - sections/elegantbook/06.qmd
    - sections/elegantbook/07.qmd
    - sections/elegantbook/08.qmd
    - sections/elegantbook/09.qmd
    - sections/elegantbook/10.qmd
    - sections/elegantbook/11.qmd
    - chap1.qmd
    - sections/test/01.qmd
    - sections/test/02.qmd
    - chap2.qmd
    - sections/chapter2/01.qmd
    - template_references.qmd
    - ref.qmd

  site-url: https://your-site.example.com/
  downloads: [pdf]
  sharing: [twitter, facebook]
  page-navigation: true

  sidebar:
    search: true
    title: false
    logo: "images/openscapes_hex.png"
    logo-alt: "Openscapes hex logo"
    pinned: true
    align: center
    style: "docked"
    collapse-level: 2
    contents:
      - index.qmd
      - section: "1 ElegantBook PDF 扩展测试文档"
        contents:
          - text: "章首页"
            href: template_chapter1.qmd
          - text: "1.1 简介"
            href: sections/elegantbook/01.qmd
          - text: "1.2 定理环境测试"
            href: sections/elegantbook/02.qmd
          - text: "1.3 其他环境测试"
            href: sections/elegantbook/03.qmd
          - text: "1.4 列表环境测试"
            href: sections/elegantbook/04.qmd
          - text: "1.5 数学公式测试"
            href: sections/elegantbook/05.qmd
          - text: "1.6 图表测试"
            href: sections/elegantbook/06.qmd
          - text: "1.7 章后习题"
            href: sections/elegantbook/07.qmd
          - text: "1.8 高级主题"
            href: sections/elegantbook/08.qmd
          - text: "1.9 随机控制理论初步"
            href: sections/elegantbook/09.qmd
          - text: "1.10 金融保险应用"
            href: sections/elegantbook/10.qmd
          - text: "1.11 习题"
            href: sections/elegantbook/11.qmd
      - section: "2 测试"
        contents:
          - text: "章首页"
            href: chap1.qmd
          - text: "2.1 Introduction"
            href: sections/test/01.qmd
          - text: "2.2 test for cosmo"
            href: sections/test/02.qmd
      - section: "3 Test"
        contents:
          - text: "章首页"
            href: chap2.qmd
          - text: "3.1 This is chapter 2"
            href: sections/chapter2/01.qmd
      - template_references.qmd
      - ref.qmd
    tools:
      - icon: globe
        href: https://yourwebsite.com
        text: "Your Website"
      - icon: github
        href: https://github.com/yourusername/yourrepo
      - icon: twitter
        href: https://twitter.com/yourusername
        text: "My Twitter"
  page-footer:
    left: |
      <span class="faux-block">{{< fa brands creative-commons >}} {{< var years >}} Your Name</span>
      <span class="faux-block">All content licensed under<br>[{{< fa brands creative-commons >}} {{< fa brands creative-commons-by >}} {{< fa brands creative-commons-sa >}} Creative Commons CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)</span>
    center: |
      <span class="faux-block">{{< fa brands orcid >}} <strong>ORCID</strong> [{{< var orcid >}}](https://orcid.org/{{< var orcid >}})</span>
      <span class="faux-block">{{< fa key >}} [PGP public key]({{< var pgp.key >}}) &emsp; {{< fa fingerprint >}} Fingerprint:</strong><br><span class="fingerprint">{{< var pgp.fingerprint >}}</span></span>
    right: |
      <span class="faux-block">Made with {{< fa brands r-project >}} and [Quarto](https://quarto.org/)</span>
      <span class="faux-block">[View the source at {{< fa brands github >}} GitHub]({{< var github-url >}})</span>

bibliography: references.bib

crossref:
  eq-prefix: ""

format:
  html:
    lang: zh
    html-math-method: katex
    mainfont: Times New Roman
    theme:
      light: [cosmo, theme.scss]
      dark: [cosmo, theme-dark.scss]
    toc: true
    toc-depth: 2
    toc-expand: true
    include-after-body:
      - comments.html
    css: styles.css
    crossref:
      chapters: true
      eq-prefix: ""
    number-depth: 2
    self-contained: false

  elegantbook-pdf:
    pdf-engine: xelatex
    keep-tex: true
    CJKmainfont: "Noto Serif CJK SC"
    CJKsansfont: "Noto Sans CJK SC"
    CJKmonofont: "Noto Sans Mono CJK SC"
    toc: true
    toc-depth: 2
    number-sections: true
    filters:
      - div-environments.lua
    include-in-header:
      - text: |
          % Title page customization — ElegantBook style
          \subtitle{Your Subtitle Here}
          \institute{Your University, Your Department}
          \version{v1.0}
